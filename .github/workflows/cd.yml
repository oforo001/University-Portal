name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./University-Portal/University-Portal.sln

      - name: Build
        run: dotnet build ./University-Portal/University-Portal.sln -c Release --no-restore

      - name: Test
        run: dotnet test ./University-Portal.Tests/University-Portal.Tests.csproj -c Release --no-build

      - name: Publish (Linux runtime)
        run: dotnet publish ./University-Portal/University-Portal.csproj \
             -c Release \
             -r linux-x64 \
             --self-contained false \
             -o publish

      - name: Inspect publish output
        run: |
          echo "=== FILES ==="
          ls -la publish
          echo "=== DLL ==="
          ls publish/*.dll

      - name: Add version marker
        run: echo "DEPLOYED FROM CI $(date)" > publish/version.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: university-portal
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish